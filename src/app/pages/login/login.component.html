<div class="container min-vh-100 d-flex justify-content-center align-items-center">

  <div class="card shadow-sm" style="max-width: 420px; width: 100%;">
    <div class="card-body p-4">

      <div class="text-center mb-4">
        <h1 class="h4 mb-1">Codesa MVP</h1>
        <p class="text-muted mb-0">Inicio de sesión</p>
      </div>

      <div *ngIf="error" class="alert alert-danger">
        {{ error }}
      </div>

      <form [formGroup]="form" (ngSubmit)="login()">

        <div class="mb-3">
          <label class="form-label">Correo</label>
          <input
            type="email"
            class="form-control"
            formControlName="email"
            [class.is-invalid]="campoInvalido('email')">

          <div class="invalid-feedback">
            Ingresa un correo válido.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input
            type="password"
            class="form-control"
            formControlName="password"
            [class.is-invalid]="campoInvalido('password')">

          <div class="invalid-feedback">
            La contraseña es obligatoria.
          </div>
        </div>

        <button
          type="submit"
          class="btn btn-primary w-100"
          [disabled]="cargando">

          {{ cargando ? 'Ingresando...' : 'Ingresar' }}
        </button>

      </form>

      <hr>

      <div class="d-grid gap-2">
        <button
          type="button"
          class="btn btn-outline-secondary btn-sm"
          (click)="usarUsuarioDemo()">
          Usar USER demo
        </button>

        <button
          type="button"
          class="btn btn-outline-dark btn-sm"
          (click)="usarAdminDemo()">
          Usar ADMIN demo
        </button>
      </div>

      <div class="mt-3 small text-muted">
        <strong>USER:</strong> user&#64;codesa.com / User123* <br>
        <strong>ADMIN:</strong> admin&#64;codesa.com / Admin123*
      </div>

    </div>
  </div>

</div>
